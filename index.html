<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Aayush Khadka — Civil Engineer</title>

<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />

<style>
  :root {
    --bg: #F8F7F4;
    --surface: #F2F0EC;
    --ink: #2C2C28;
    --ink-muted: #8A8880;
    --ink-faint: #B8B6B2;
    --accent: #4A6E5A;
    --border: #E4E2DC;
    --radius: 8px;
    --sans: 'Inter', sans-serif;
    --serif: 'Lora', serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--ink);
    font-size: 15px;
    line-height: 1.75;
  }

  a { color: inherit; text-decoration: none; }

  /* NAV */
  nav {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 100;
    display: flex;
    justify-content: center;
    padding: .9rem 2rem;
    background: rgba(248,247,244,.92);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid var(--border);
  }

  .nav-links {
    display: flex;
    gap: 2rem;
  }

  .nav-links a {
    font-size: 12px;
    text-transform: uppercase;
    color: var(--ink-muted);
  }

  .nav-links a:hover { color: var(--ink); }

  /* HERO */
  #hero {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding-top: 5rem;
    border-bottom: 1px solid var(--border);
  }

  /* ✅ HEADSHOT ADDED */
  .hero-photo {
    width: 140px;
    height: 140px;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid var(--border);
    margin-bottom: 1.5rem;
    display: block;
  }

  .hero-title {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: .14em;
    color: var(--ink-muted);
    margin-bottom: 1rem;
  }

  .hero-name {
    font-family: var(--serif);
    font-size: clamp(3rem, 9vw, 6rem);
  }

  .hero-name em {
    font-style: italic;
    color: var(--accent);
  }

  .hero-desc {
    max-width: 460px;
    margin: 1rem auto 2rem;
    color: var(--ink-muted);
  }

  .tag-row {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: .5rem;
    margin-bottom: 2rem;
  }

  .tag {
    font-size: 11px;
    padding: .3rem .75rem;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--surface);
  }

  .btn {
    padding: .6rem 1.4rem;
    font-size: 12px;
    text-transform: uppercase;
    border-radius: var(--radius);
  }

  .btn-primary {
    background: var(--ink);
    color: white;
  }

  .btn-outline {
    border: 1px solid var(--border);
  }

</style>
</head>

<body>

<nav>
  <div class="nav-links">
    <a href="#about">About</a>
    <a href="#skills">Skills</a>
    <a href="#experience">Experience</a>
    <a href="#projects">Projects</a>
    <a href="#education">Education</a>
    <a href="#contact">Contact</a>
  </div>
</nav>

<!-- HERO -->
<section id="hero">

  <div class="fade-in">

    <!-- ✅ HEADSHOT IMAGE -->
    <img src="headshot.jpg" alt="Aayush Khadka" class="hero-photo" />

    <div class="hero-title">Civil Engineer &amp; H&amp;H Analyst</div>

    <div class="hero-name">
      Aayush <em>Khadka</em>
    </div>

    <p class="hero-desc">
      Water resources engineer focused on hydraulic & hydrologic modeling,
      stormwater management, and flood analysis across Louisiana.
    </p>

    <div class="tag-row">
      <span class="tag">HEC-RAS</span>
      <span class="tag">HEC-HMS</span>
      <span class="tag">ArcGIS</span>
      <span class="tag">Python</span>
    </div>

    <div>
      <a class="btn btn-primary" href="#projects">View Projects</a>
      <a class="btn btn-outline" href="#contact">Contact</a>
    </div>

  </div>

</section>

</body>
</html>
